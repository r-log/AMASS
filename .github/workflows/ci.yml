name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Lint — runs in parallel with tests (no dependency)
  # --------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check Python syntax
        working-directory: backend
        run: python -m py_compile run.py && python -m compileall app/ -q

  # --------------------------------------------------------------------------
  # Tests — parallel execution with pytest-xdist
  #   PRs:   Python 3.10 only (fast feedback)
  #   main:  full matrix (3.10, 3.11, 3.12)
  # --------------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ github.event_name == 'pull_request' && fromJSON('["3.10"]') || fromJSON('["3.10", "3.11", "3.12"]') }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # -- Cache apt packages so libvips-dev isn't re-downloaded every run --
      - name: Cache apt packages
        uses: actions/cache@v4
        id: apt-cache
        with:
          path: ~/apt-cache
          key: apt-${{ runner.os }}-libvips-poppler-v1

      - name: Install system dependencies
        run: |
          if [ -d ~/apt-cache ]; then
            sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libvips-dev poppler-utils
          mkdir -p ~/apt-cache
          cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true

      # -- Cache the full installed venv (not just pip downloads) --
      - name: Cache Python venv
        uses: actions/cache@v4
        id: venv-cache
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('backend/requirements.txt') }}

      - name: Install Python dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        run: |
          . ../.venv/bin/activate
          python -m pytest tests/ -n auto --tb=short --junitxml=../test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml

  # --------------------------------------------------------------------------
  # Docker build — verify the image builds successfully
  # --------------------------------------------------------------------------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: electrician-log-mvp:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          docker run -d --name smoke \
            -e FLASK_ENV=production \
            -e SECRET_KEY=ci-test-only-not-real \
            -p 5000:5000 \
            electrician-log-mvp:ci-${{ github.sha }}

          # Wait for healthcheck
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/ > /dev/null 2>&1; then
              echo "Container healthy after ${i}s"
              break
            fi
            sleep 1
          done

          # Verify API responds
          curl -sf http://localhost:5000/ || (docker logs smoke && exit 1)
          docker stop smoke
