name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Lint — fast gate before tests
  # --------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check Python syntax
        working-directory: backend
        run: python -m py_compile run.py && python -m compileall app/ -q

  # --------------------------------------------------------------------------
  # Tests — full backend suite
  # --------------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libvips-dev poppler-utils

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-${{ matrix.python-version }}-

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short --junitxml=../test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml

  # --------------------------------------------------------------------------
  # Docker build — verify the image builds successfully
  # --------------------------------------------------------------------------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: electrician-log-mvp:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          docker run -d --name smoke \
            -e FLASK_ENV=production \
            -e SECRET_KEY=ci-test-only-not-real \
            -p 5000:5000 \
            electrician-log-mvp:ci-${{ github.sha }}

          # Wait for healthcheck
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/ > /dev/null 2>&1; then
              echo "Container healthy after ${i}s"
              break
            fi
            sleep 1
          done

          # Verify API responds
          curl -sf http://localhost:5000/ || (docker logs smoke && exit 1)
          docker stop smoke
